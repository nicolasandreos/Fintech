<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre em sua Conta</title>
    <link rel="stylesheet" href="static/login-cadastro.css">
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

</head>
<body>
    <main>
        <div class="container">

            <div class="titulo-subtitulo">
                <h1>Seja Bem Vindo</h1>
                <h3>Entre na sua conta</h3>
            </div>

            <form action="" method="post" name="login" id="login">

                <div class="campos_forms">

                    <div class="campo_forms">
                        <label for="email">Email*</label>
                        <input type="email" id="email" class="email" placeholder="Seu melhor email">
                        <i class='bxr bxs-user icon'></i>
                    </div>

                    <div class="campo_forms">
                        <label for="password">Senha*</label>
                        <input type="password" id="password" class="password" placeholder="Insira sua senha">
                        <i class='bxr  bxs-eye-slash bx-rotate-270 bx-flip-vertical icon'  style='color:#2f2f2f'></i> 
                    </div>
                </div>

                <a href="#">Esqueceu a senha?</a>

                <button type="button" class="btn">Entrar</button>
            </form>

            <hr>

            <div class="nao_conta">
                <p>Não possui uma conta?</p> 
                <a href="#">Clique Aqui</a>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
